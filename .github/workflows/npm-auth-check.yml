# 臨時診斷用 —— 不發布任何東西,查完即刪。
# 目的:確認 NPM_TOKEN 是否真的被 npm 讀到、以及該帳號能否建立新的 @cornhsu 套件。
name: npm auth check (temporary)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install -g npm@latest && npm --version

      - name: 方法 A —— 手寫 ~/.npmrc(目前 release.yml 用的方式)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          echo "token 長度:${#NPM_TOKEN}"
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          echo "userconfig 路徑:$(npm config get userconfig)"
          echo "~/.npmrc 大小:$(wc -c < ~/.npmrc 2>/dev/null || echo '不存在')"
          echo "--- npm whoami ---"
          npm whoami
          echo "whoami 結束碼:$?"

      - name: 檢查能否對 @cornhsu scope 建立新套件(dry-run,不會真的發布)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          mkdir -p /tmp/probe && cd /tmp/probe
          cat > package.json <<'JSON'
          {
            "name": "@cornhsu/zz-auth-probe",
            "version": "0.0.1-probe",
            "private": false
          }
          JSON
          echo "--- npm publish --dry-run ---"
          npm publish --access public --dry-run
          echo "dry-run 結束碼:$?"
          echo "--- npm access list packages(看 token 實際能碰哪些)---"
          npm access list packages 2>&1 | head -20
